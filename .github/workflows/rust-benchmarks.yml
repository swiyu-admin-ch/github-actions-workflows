# separate terms of service, privacy policy, and support
# documentation.

name: Execute Rust benchmarks

on:
  workflow_call:
    inputs:
      quiet:
        description: "Whether to print cargo log messages (while running 'cargo bench ...' command)"
        type: boolean
        required: false
        default: false
      report-filename-base:
        description: "The prefix to use for report bundle"
        type: string
        required: false
        default: benchmarks-report

permissions:
  # to fetch code (actions/checkout)
  contents: read

jobs:
  rust-benchmarks:
    name: Execute all benchmarks of a local package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        BUILD_TARGET: [ release ] # refers to a cargo profile
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Execute benchmarks (quietly)
        # Rust available from the get go in ubuntu-latest (https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md#rust-tools)
        if: ${{ inputs.quiet == true }}
        run: cargo bench --profile ${{ matrix.BUILD_TARGET }} --quiet #--message-format human
        continue-on-error: false

      - name: Execute benchmarks
        if: ${{ inputs.quiet != true }}
        run: cargo bench --profile ${{ matrix.BUILD_TARGET }} #--message-format human
        continue-on-error: false

      - name: Save report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.report-filename-base }}-${{ matrix.BUILD_TARGET }}.zip
          path: target/criterion
          retention-days: 0
          # 9: Best compression Higher levels will result in better compression, but will take longer to complete
          compression-level: 9
