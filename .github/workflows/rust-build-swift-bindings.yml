# separate terms of service, privacy policy, and support
# documentation.

name: Build library (Swift)

on:
  workflow_call:
    inputs:
      newVersion:
        description: 'New Version'
        type: string
        default: '0.0.0'
        required: true
      swiftPackageName:
        description: 'Swift Package Name'
        type: string
        default: 'DidResolver'
        required: true
      xcFrameworkName:
        description: 'XCFramework Name'
        type: string
        default: 'didresolver'
        required: true
      binaryTargetUrlGitHubOwner:
        description: 'The GitHub owner of repo hosting the Swift release package available at https://github.com/<binaryTargetUrlGitHubOwner>/<binaryTargetUrlGitHubRepo>/releases/download/<newVersion>/<xcFrameworkName>-<newVersion>.xcframework.zip'
        type: string
        default: 'swiyu-admin-ch'
        required: false
      binaryTargetUrlGitHubRepo:
        description: 'The GitHub repo hosting Swift release package available at https://github.com/<binaryTargetUrlGitHubOwner>/<binaryTargetUrlGitHubRepo>/releases/download/<newVersion>/<xcFrameworkName>-<newVersion>.xcframework.zip'
        type: string
        default: 'didresolver-swift'
        required: true

permissions:
  # to fetch code (actions/checkout)
  contents: read

jobs:
  build:
    name: Build Swift bindings
    # If using 'runs-on: macos-latest', beware of https://github.com/actions/runner-images/issues/12520
    # Furthermore, the 'macos-<VER>' version used here should match the one in build script (e.g. 'platforms: [.iOS(.v14)]')
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
      - name: Cache Rust modules
        id: cache-rust
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        env:
          cache-name: cache-rust-modules
        with:
          path: target
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/Cargo.toml') }}
          # An ordered multiline string listing the prefix-matched keys, that are used for restoring stale cache if no cache hit occurred for key. Note `cache-hit` returns false in this case.
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install iOS targets
        # Only Tier: 2 (without Host Tools) targets (according to https://doc.rust-lang.org/rustc/platform-support/apple-ios.html)
        run: |
          # Rust available from the get go in ubuntu-latest (https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md#rust-tools)
          rustup target add aarch64-apple-ios-sim
          rustup target add aarch64-apple-ios
          rustup target add x86_64-apple-ios

      - name: Install XCode build tools
        run: |
          echo ">>"; echo ">> Checking Xcode CLI tools..."; echo ">>"
          # Only run if the tools are not installed yet
          # To check that try to print the SDK path
          xcode-select -p &> /dev/null
          if [ $? -ne 0 ]; then
            echo ">>"; echo ">> Xcode CLI tools not found. Installing them..."; echo ">>"
            touch /tmp/.com.apple.dt.CommandLineTools.installondemand.in-progress;
            PROD=$(softwareupdate -l |
              grep "\*.*Command Line" |
              head -n 1 | awk -F"*" '{print $2}' |
              sed -e 's/^ *//' |
              tr -d '\n')
            softwareupdate -i "$PROD" -v;
          else
            echo ">>"; echo ">> Xcode CLI tools OK"; echo ">>"
          fi
          /usr/bin/xcodebuild -version
          echo ">>"
          /usr/bin/gcc --version
          echo ">>"
          /usr/bin/swift --version

      - name: Download the build script
        run: |
          pwd
          curl -o  $PWD/rust-build-swift-bindings.sh https://raw.githubusercontent.com/swiyu-admin-ch/github-actions-workflows/refs/heads/main/scripts/rust-build-swift-bindings.sh
          chmod +x $PWD/rust-build-swift-bindings.sh

      - name: Build UniFFI bindings and Swift packages
        shell: bash
        run: $PWD/rust-build-swift-bindings.sh ${{ inputs.newVersion }} ${{ inputs.swiftPackageName }} ${{ inputs.xcFrameworkName }} ${{ inputs.binaryTargetUrlGitHubOwner }} ${{ inputs.binaryTargetUrlGitHubRepo }}

      - name: Save Swift package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: swift-bindings-${{ inputs.newVersion }}
          path: |
            output
