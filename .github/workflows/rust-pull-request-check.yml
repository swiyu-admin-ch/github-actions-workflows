name: Pull Request Check for Rust

run-name: ${{ github.repository }} is evaluating pull request

on:
  workflow_call:

permissions:
  # Required to upload SARIF file to CodeQL. See: https://github.com/github/codeql-action/issues/2117
  actions: read
  # Require writing security events to upload SARIF file to security tab
  # As described at https://github.com/github/codeql-action?tab=readme-ov-file#workflow-permissions
  security-events: write
  # to fetch code (actions/checkout)
  contents: read
  # ???
  packages: write
  attestations: write
  id-token: write

jobs:
  rust-code-quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install the Rust toolchain
        # https://github.com/marketplace/actions/rust-toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          #components: clippy
          override: true

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          #key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Build binaries (release)
        if: false #REMOVEME
        run: cargo build --profile release
        continue-on-error: false

      - name: Run tests (release)
        if: false #REMOVEME
        # as suggested by https://github.com/johnterickson/cargo2junit
        run: |
          cargo install cargo2junit
          cargo test --profile release -- -Z unstable-options --format json --report-time | tee test-results-release.json
          cat test-results-release.json | cargo2junit > test-results-release.xml
        env: # See https://github.com/johnterickson/cargo2junit/issues/79
          RUSTC_BOOTSTRAP: 1
        #continue-on-error: false

      - name: Upload test results (release)
        if: false #REMOVEME
        #if: (!cancelled())
        uses: actions/upload-artifact@v4
        with:
          name: Test results (release)
          path: test-results-release.xml
          retention-days: 1 # minimum

  codeql-analysis:
    name: CodeQL Analysis
    needs: rust-code-quality-check
    runs-on: ubuntu-latest
    if: (!cancelled())

    steps:
      # CAUTION The CodeQL action MUST follow the compilation step
      # See https://github.com/github/codeql-action
      - name: Initialize CodeQL
        # Sets up CodeQL for analysis.
        # For information about input parameters, see https://github.com/github/codeql-action/blob/main/init/action.yml
        uses: github/codeql-action/init@v3
        with:
          languages: rust
          #config-file: .github/codeql/rust-codeql-config.yml
          config: |-
            queries:
              - name: rust-security-extended
                uses: rust-security-extended
              - name: rust-security-and-quality
                uses: rust-security-and-quality
            
            # Additional queries for extended security analysis
            query-filters:
              - include:
                  kind: problem
              - include:
                  kind: path-problem
              - include:
                  severity: ["error", "warning"]  # Only errors and warnings
            #  - exclude:
            #      tags: ["external/cwe/cwe-798"] # Exclude specific CWEs
            
            # Extended analysis options
            disable-default-queries: false
            
            # manual - you define the build steps to use for the codebase in the workflow (supported for all compiled languages, except Rust).
            #build-mode: manual

      - name: Perform CodeQL Analysis
        # Finalizes the CodeQL database, runs the analysis, and uploads the results to Code Scanning.
        # For information about input parameters, see https://github.com/github/codeql-action/blob/main/analyze/action.yml
        uses: github/codeql-action/analyze@v3
        with:
          # String used by Code Scanning for matching the analyses
          #
          # Optional. Specify a category to distinguish between multiple analyses
          # for the same tool and ref. If you don't use `category` in your workflow,
          # GitHub will generate a default category name for you
          category: "/language:rust"

  # as suggested by https://github.com/EnricoMi/publish-unit-test-result-action?tab=readme-ov-file#use-with-matrix-strategy
  publish-test-results:
    name: Publish tests results
    needs: rust-code-quality-check
    runs-on: ubuntu-latest
    if: false #REMOVEME
    #if: (!cancelled())

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: artifacts/**/test-results-*.xml
          deduplicate_classes_by_file_name: true
          report_individual_runs: true

      #- name: Publish test report
      #  #https://github.com/marketplace/actions/junit-report-action
      #  uses: mikepenz/action-junit-report@v3
      #  if: success() || failure() # always run even if the previous step fails
